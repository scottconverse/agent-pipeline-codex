# SPDX-License-Identifier: Apache-2.0
# Bugfix pipeline — shorter sequence for bug fixes.
#
# Differs from feature.yaml in two ways:
#   1. No separate test-write stage; reproduction in the executor's
#      first pass produces a failing test that the patch then makes
#      pass. (Bugfixes that don't have a reproducing test should be
#      promoted to the feature pipeline so a test-writer designs the
#      coverage.)
#   2. No separate planner gate before reproduction — the bug is
#      either reproducible or it isn't, and the manifest already
#      captures the symptom.

pipeline: bugfix

stages:
  - name: manifest
    role: human
    artifact: manifest.yaml
    gate: human_approval

  - name: research
    role: researcher
    artifact: research.md

  - name: reproduce
    role: executor
    artifact: reproduction-report.md

  - name: patch
    role: executor
    artifact: implementation-report.md

  - name: policy
    role: pipeline
    command: python scripts/policy/run_all.py --run {run_id}
    artifact: policy-report.md

  - name: verify
    role: verifier
    artifact: verifier-report.md

  - name: drift-detect
    role: drift-detector
    artifact: drift-report.md

  - name: critique
    role: critic
    artifact: critic-report.md

  - name: auto-promote
    role: pipeline
    command: python scripts/policy/auto_promote.py --run {run_id}
    artifact: auto-promote-report.md
    optional_artifact: true

  - name: manager
    role: manager
    artifact: manager-decision.md
    gate: human_approval
    auto_promote_aware: true
