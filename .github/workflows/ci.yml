name: CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - ".codex-plugin/**"
      - "hooks/**"
      - "scripts/**"
      - "tests/**"
      - "skills/**"
      - "pipelines/**"
      - "commands/**"
      - "docs/index.html"
      - "README.md"
      - "ARCHITECTURE.md"
      - "USER-MANUAL.md"
      - "CHANGELOG.md"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - ".codex-plugin/**"
      - "hooks/**"
      - "scripts/**"
      - "tests/**"
      - "skills/**"
      - "pipelines/**"
      - "commands/**"
      - "docs/index.html"
      - "README.md"
      - "ARCHITECTURE.md"
      - "USER-MANUAL.md"
      - "CHANGELOG.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install pytest PyYAML

      - name: Run source-only release verification
        run: python scripts/verify_plugin_release.py --source-only
